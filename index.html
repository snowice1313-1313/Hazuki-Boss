<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');:root{--hazuki-green:#1A4C3F;--hazuki-gold:#D4AF37;--dark-bg:#121212;--dark-card:#1f2937;--dark-border:#374151}body{font-family:'Noto Sans TC',sans-serif;background-color:var(--dark-bg);color:#e5e7eb;overflow-x:hidden}.bg-hazuki{background-color:var(--hazuki-green)}.text-gold{color:var(--hazuki-gold)}.border-gold{border-color:var(--hazuki-gold)}.input-std{border:1px solid var(--dark-border);padding:12px;border-radius:6px;width:100%;background-color:#374151;color:#f3f4f6;font-size:16px;font-weight:500}.input-std:focus{border-color:var(--hazuki-gold);outline:none;background-color:#1f2937}.input-std:read-only{background-color:#1f2937;color:#9ca3af;border-color:#374151}.unit-tag{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:0.75rem;font-weight:700;pointer-events:none}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
#loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,#0d2b1f 0%,#1A4C3F 60%,#0d2b1f 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
#loginScreen .login-box{width:100%;max-width:360px;background:rgba(255,255,255,0.05);border:1px solid var(--hazuki-gold);border-radius:20px;padding:36px 28px;box-shadow:0 8px 40px rgba(0,0,0,0.6);}
#loginScreen .login-logo{font-size:2.6rem;font-weight:900;color:var(--hazuki-gold);letter-spacing:0.15em;text-align:center;margin-bottom:4px;}
#loginScreen .login-sub{font-size:0.7rem;color:#9ca3af;text-align:center;letter-spacing:0.2em;margin-bottom:32px;}
#loginScreen .login-input{width:100%;background:#1f2937;border:1px solid #374151;border-radius:10px;padding:14px 16px;color:#f3f4f6;font-size:16px;margin-bottom:14px;outline:none;transition:border 0.2s;}
#loginScreen .login-input:focus{border-color:var(--hazuki-gold);}
#loginScreen .login-btn{width:100%;background:var(--hazuki-gold);color:#1A4C3F;font-size:1rem;font-weight:900;padding:15px;border-radius:10px;border:none;margin-top:8px;letter-spacing:0.1em;cursor:pointer;transition:opacity 0.2s;}
#loginScreen .login-btn:active{opacity:0.8;}

</style>

<div class="max-w-4xl mx-auto px-4 -mt-12">
<div class="grid grid-cols-3 gap-2 mb-4">
<button onclick="askClear()" class="bg-red-900 py-3 rounded-xl border border-red-700 text-red-100 font-bold text-xs">🆕 清空重算</button>
<button onclick="openRecipeModal()" class="bg-gray-800 py-3 rounded-xl border border-gray-700 text-gray-100 font-bold text-xs">📂 讀取配方</button>
<button onclick="saveCurrentRecipe()" class="bg-gray-800 py-3 rounded-xl border border-gray-700 text-gold font-bold text-xs">💾 儲存計算</button>
</div>
<div class="grid grid-cols-2 gap-2 mb-4">
<button onclick="exportAllData()" class="bg-gray-800 py-3 rounded-xl border border-gray-600 text-blue-300 font-bold text-xs">📤 匯出全部資料</button>
<button onclick="importAllData()" class="bg-gray-800 py-3 rounded-xl border border-gray-600 text-green-300 font-bold text-xs">📥 匯入資料</button>
</div>
<div class="bg-gray-800 rounded-lg p-4 mb-4 flex justify-between items-center border border-gray-700"><p class="text-sm text-gold font-bold">配方試算控制台</p><button onclick="openDbModal()" class="text-xs text-gray-300 border border-gray-600 px-4 py-2 rounded-lg font-bold">⚙️ 管理原料庫</button></div>
<div class="bg-gray-800 rounded-lg shadow-lg overflow-hidden mb-8 border border-gray-700">
<div class="p-5 border-b border-gray-700"><label class="block text-[10px] font-bold text-gold uppercase mb-2">產品名稱</label><input type="text" id="productName" placeholder="例如：雪花冰磚" class="input-std text-lg font-bold"></div>
<div class="p-5 pb-2 bg-gray-900 border-b border-gray-800"><div class="flex bg-gray-800 rounded-lg p-1 border border-gray-700"><button id="btnModeRecipe" onclick="setMode('recipe')" class="flex-1 py-3 text-sm font-bold rounded-md bg-hazuki text-white shadow">🧑‍🍳 自製配方</button><button id="btnModeResale" onclick="setMode('resale')" class="flex-1 py-3 text-sm font-bold rounded-md text-gray-400 bg-transparent">📦 單純轉賣</button></div></div>
<div id="recipeSection"><div class="p-5"><div id="ingredientsList" class="space-y-4 mb-6"></div><button onclick="addIngredientRow()" class="w-full py-4 border-2 border-dashed border-gray-600 text-gray-400 font-bold rounded-lg">+ 新增一項原料</button></div>
<div class="bg-gray-900 p-6 border-t border-gray-700"><div class="flex justify-between mb-6"><div><span class="text-xs font-bold text-gray-400 block">配方總成本</span><span class="text-2xl font-black text-white">$ <span id="displayTotalBatchCost">0.00</span></span></div></div><div class="bg-gray-800 p-4 rounded-lg border border-gray-700 flex items-center gap-4"><div class="flex-1 text-center"><label class="text-[10px] font-bold text-gray-400 block">總產量</label><input type="number" id="batchYield" value="1" oninput="calculateAll()" class="input-std text-center font-bold"></div><div class="text-2xl font-black text-white">$<span id="displayUnitCost">0.0</span></div></div></div></div>
<div class="bg-gray-950 p-6 text-white border-t border-gray-800"><h3 class="text-xs font-bold text-gold mb-4 border-b border-gray-800 pb-2 uppercase tracking-widest">利潤分析</h3><div class="bg-gray-900 rounded border border-gray-700 p-4 mb-6" id="costBox"><label id="costLabel" class="text-[10px] text-gray-400 block mb-1 font-bold">基準成本 ($)</label><input type="number" id="pricingCost" oninput="calculatePricing()" class="w-full bg-transparent border-b border-gray-600 text-gold text-3xl font-bold focus:outline-none" readonly></div>
<div class="flex gap-4 mb-6 items-center"><div class="w-1/2 text-center"><label class="text-[10px] text-gray-400 block">目標毛利%</label><input type="number" id="targetMargin" value="35" oninput="calculatePricing()" class="w-full bg-transparent border-b border-gold text-white text-2xl font-bold focus:outline-none"></div><div class="w-1/2 text-right"><label class="text-xs text-gold block">建議售價</label><div class="text-3xl text-white font-light">$ <span id="displaySuggestedPrice">0</span></div></div></div>
<div class="flex gap-4 mt-6 items-center"><div class="w-1/2 text-center"><label class="text-[10px] text-gray-400 block">手動售價</label><input type="number" id="manualPrice" oninput="calculatePricing()" class="w-full bg-transparent border-b border-gray-600 text-gold text-2xl font-bold focus:outline-none"></div><div class="w-1/2 text-right"><label class="text-[10px] text-gray-400 block">實際毛利率</label><div class="text-2xl font-black"><span id="displayManualMargin">0.0</span>%</div></div></div></div></div></div>
<div id="confirmModal" class="modal-overlay z-[100]"><div class="bg-gray-900 border border-gold w-full max-w-xs rounded-2xl p-6 shadow-2xl text-center"><div class="flex justify-end -mt-2 -mr-2 mb-2"><button onclick="closeConfirm()" class="w-8 h-8 bg-gray-800 text-white rounded-full font-bold">✕</button></div><div class="text-4xl mb-3">⚠️</div><h3 id="confirmTitle" class="text-base font-bold text-white mb-6">確定要執行嗎？</h3><div class="flex flex-col gap-2"><button id="confirmYes" class="w-full py-4 bg-hazuki text-white rounded-xl font-bold text-sm">確認執行</button><button onclick="closeConfirm()" class="w-full py-3 text-gray-400 text-sm font-bold">取消返回</button></div></div></div>
<div id="dbModal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-50 flex items-end md:items-center justify-center"><div class="bg-gray-900 w-full md:w-2/3 rounded-t-2xl h-[85vh] flex flex-col overflow-hidden border border-gray-800"><div class="bg-gray-800 p-4 flex justify-between items-center border-b border-gray-700"><h3 class="font-bold text-gold">原料庫</h3><button onclick="closeDbModal()" class="text-3xl px-4 text-white">✕</button></div><div class="p-4 bg-gray-800 border-b border-gray-700"><input type="hidden" id="editIndex" value="-1"><div class="grid grid-cols-4 gap-3 mb-4"><div class="col-span-4"><input type="text" id="dbName" placeholder="品名" class="input-std py-2"></div><div class="col-span-2"><input type="number" id="dbPrice" placeholder="單價" class="input-std py-2"></div><div class="col-span-2 flex gap-1"><input type="number" id="dbWeight" placeholder="規格" class="input-std py-2"><input type="text" id="dbUnit" placeholder="單位" class="w-12 bg-transparent text-center text-xs"></div></div><button id="saveDbBtn" onclick="saveDbItem()" class="w-full py-3 bg-hazuki rounded-lg font-bold">儲存數據</button></div><div class="flex-1 overflow-y-auto p-4 bg-gray-900" id="dbList"></div></div></div>
<div id="recipeModal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-50 flex items-end md:items-center justify-center"><div class="bg-gray-900 w-full md:w-2/3 rounded-t-2xl h-[85vh] flex flex-col overflow-hidden border border-gray-800"><div class="bg-hazuki p-4 flex justify-between items-center border-b border-hazuki"><h3 class="font-bold text-gold">產品配方庫</h3><button onclick="closeRecipeModal()" class="text-white text-3xl px-4">✕</button></div><div class="p-3 bg-gray-800 flex flex-col gap-2"><input type="text" id="recipeSearch" oninput="filterRecipes()" placeholder="🔍 搜尋名稱..." class="input-std py-2 bg-gray-900 border-gray-700"><div class="flex gap-1 bg-gray-900 p-1 rounded border border-gray-700"><button id="tab-all" onclick="filterRecipes('all')" class="flex-1 py-2 text-xs font-bold rounded bg-hazuki">全部</button><button id="tab-recipe" onclick="filterRecipes('recipe')" class="flex-1 py-2 text-xs font-bold rounded text-gray-400 bg-transparent">配方</button><button id="tab-resale" onclick="filterRecipes('resale')" class="flex-1 py-2 text-xs font-bold rounded text-gray-400 bg-transparent">轉賣</button></div></div><div class="flex-1 overflow-y-auto p-4 bg-gray-900" id="recipeListContainer"></div></div></div>
<script>
const DB_KEY='hazuki_ingredients_v2',RECIPE_KEY='hazuki_recipes_v2';let ingredients=[],dbItems=[],savedRecipes=[],currentMode='recipe',currentFilter='all',confirmCallback=null;
// onload handled by login logic below
window.onpopstate=function(e){if(document.getElementById('confirmModal').style.display==='flex'){closeConfirm(true)}else if(!document.getElementById('recipeModal').classList.contains('hidden')){closeRecipeModal(true)}else if(!document.getElementById('dbModal').classList.contains('hidden')){closeDbModal(true)}};
function hazukiConfirm(msg,cb){document.getElementById('confirmTitle').innerText=msg;document.getElementById('confirmModal').style.display='flex';confirmCallback=cb;history.pushState({modal:true},null)}
function closeConfirm(isBack){document.getElementById('confirmModal').style.display='none';confirmCallback=null;if(!isBack&&history.state&&history.state.modal)history.back()}
document.getElementById('confirmYes').onclick=function(){const cb=confirmCallback;closeConfirm();if(cb)cb()};
function askClear(){hazukiConfirm('確定要清空目前畫面內容嗎？',()=>{document.getElementById('productName').value='';document.getElementById('batchYield').value=1;document.getElementById('targetMargin').value=35;document.getElementById('manualPrice').value='';document.getElementById('pricingCost').value='';document.getElementById('ingredientsList').innerHTML='';ingredients=[];addIngredientRow();setMode('recipe');calculateAll();window.scrollTo(0,0)})}
function setMode(m){currentMode=m;const r=document.getElementById('btnModeRecipe'),s=document.getElementById('btnModeResale'),sc=document.getElementById('recipeSection'),ci=document.getElementById('pricingCost'),cl=document.getElementById('costLabel'),cb=document.getElementById('costBox');if(m==='recipe'){r.className="flex-1 py-3 text-sm font-bold rounded-md bg-hazuki text-white";s.className="flex-1 py-3 text-sm font-bold rounded-md text-gray-400 bg-transparent";sc.style.display='block';cl.innerText="基準成本 (自動)";ci.readOnly=true;cb.style.borderColor="#374151";calculateAll()}else{s.className="flex-1 py-3 text-sm font-bold rounded-md bg-gray-700 text-gold border border-gold";r.className="flex-1 py-3 text-sm font-bold rounded-md text-gray-400 bg-transparent";sc.style.display='none';cl.innerText="進貨成本 (手動)";ci.readOnly=false;cb.style.borderColor="#D4AF37"}}
function loadRecipes(){const s=localStorage.getItem(RECIPE_KEY);savedRecipes=s?JSON.parse(s):[]}
function saveRecipesToStorage(){localStorage.setItem(RECIPE_KEY,JSON.stringify(savedRecipes))}
function saveCurrentRecipe(){const n=document.getElementById('productName').value.trim();if(!n)return alert('請輸入產品名稱');const d={id:Date.now(),name:n,mode:currentMode,batchYield:document.getElementById('batchYield').value,targetMargin:document.getElementById('targetMargin').value,manualPrice:document.getElementById('manualPrice').value,pricingCost:document.getElementById('pricingCost').value,items:[]};if(currentMode==='recipe'){ingredients.forEach((it,i)=>{const row=document.getElementById('row-'+i);if(!row||row.style.display==='none')return;const nm=document.getElementById('name-'+i).value;if(nm)d.items.push({name:nm,price:document.getElementById('price-'+i).value,weight:document.getElementById('weight-'+i).value,used:document.getElementById('used-'+i).value,unit:document.getElementById('unit-label-weight-'+i).innerText})});if(!d.items.length)return alert('請填寫配方內容')}else if(!d.pricingCost)return alert('請輸入進貨成本');const ex=savedRecipes.findIndex(r=>r.name===n);if(ex>=0){hazukiConfirm('【'+n+'】已存在，確定覆蓋更新？',()=>{savedRecipes[ex]=d;saveRecipesToStorage();alert('存檔成功')})}else{savedRecipes.push(d);saveRecipesToStorage();alert('存檔成功')}}
function openRecipeModal(){loadRecipes();filterRecipes('all');document.getElementById('recipeModal').classList.remove('hidden');history.pushState({modal:true},null)}
function closeRecipeModal(isBack){document.getElementById('recipeModal').classList.add('hidden');if(!isBack&&history.state&&history.state.modal)history.back()}
function openDbModal(){document.getElementById('dbModal').classList.remove('hidden');resetDbInput();renderDbList();history.pushState({modal:true},null)}
function closeDbModal(isBack){document.getElementById('dbModal').classList.add('hidden');if(!isBack&&history.state&&history.state.modal)history.back()}
function filterRecipes(t){if(t)currentFilter=t;const s=document.getElementById('recipeSearch').value.toLowerCase(),c=document.getElementById('recipeListContainer');c.innerHTML='';const f=savedRecipes.filter(r=>{const mt=r.name.toLowerCase().includes(s),md=r.mode||'recipe';return mt&&(currentFilter==='all'||currentFilter===md)});f.forEach(r=>{const i=savedRecipes.indexOf(r),d=document.createElement('div');d.className="bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between items-center mb-2";d.onclick=(e)=>{if(e.target.tagName!=='BUTTON')loadRecipeIntoCalculator(i)};d.innerHTML=`<div><div class="font-bold text-white">${r.name}</div><div class="text-[10px] text-gold">${r.mode==='resale'?'📦 轉賣':'🧑‍🍳 配方'}</div></div><button onclick="askDeleteRecipe(${i})" class="px-3 py-1 bg-red-900 rounded text-xs">刪除</button>`;c.appendChild(d)})}
function loadRecipeIntoCalculator(idx){const r=savedRecipes[idx];hazukiConfirm('確認讀取「'+r.name+'」資料？',()=>{setMode(r.mode||'recipe');document.getElementById('ingredientsList').innerHTML='';ingredients=[];document.getElementById('productName').value=r.name;document.getElementById('targetMargin').value=r.targetMargin;document.getElementById('manualPrice').value=r.manualPrice;if(r.mode==='recipe'||!r.mode){document.getElementById('batchYield').value=r.batchYield;r.items.forEach((it,i)=>{addIngredientRow();document.getElementById('name-'+i).value=it.name;document.getElementById('price-'+i).value=it.price;document.getElementById('weight-'+i).value=it.weight;document.getElementById('used-'+i).value=it.used;document.getElementById('unit-label-weight-'+i).innerText=it.unit||'';document.getElementById('unit-label-used-'+i).innerText=it.unit||''});calculateAll()}else{document.getElementById('pricingCost').value=r.pricingCost;addIngredientRow();calculatePricing()}closeRecipeModal()})}
function askDeleteRecipe(idx){hazukiConfirm('確定要刪除此產品配方嗎？',()=>{savedRecipes.splice(idx,1);saveRecipesToStorage();filterRecipes()})}
function calculateAll(){if(currentMode!=='recipe')return;let t=0,h=false;ingredients.forEach((it,i)=>{const row=document.getElementById('row-'+i);if(!row||row.style.display==='none')return;const p=parseFloat(document.getElementById('price-'+i).value)||0,w=parseFloat(document.getElementById('weight-'+i).value)||1,u=parseFloat(document.getElementById('used-'+i).value)||0;if(u>0)h=true;const c=(p/w)*u;document.getElementById('subtotal-'+i).innerText=c.toFixed(1);t+=c});document.getElementById('displayTotalBatchCost').innerText=t.toFixed(2);const y=parseFloat(document.getElementById('batchYield').value)||1,uc=t/y;document.getElementById('displayUnitCost').innerText=uc.toFixed(2);if(h)document.getElementById('pricingCost').value=uc>0?uc.toFixed(2):'';calculatePricing()}
function calculatePricing(){const c=parseFloat(document.getElementById('pricingCost').value)||0,m=parseFloat(document.getElementById('targetMargin').value)||0;let s=0;if(m<100&&c>0)s=c/(1-(m/100));document.getElementById('displaySuggestedPrice').innerText=Math.ceil(s);const mp=parseFloat(document.getElementById('manualPrice').value)||0;let mm=mp>0?((mp-c)/mp)*100:0;const e=document.getElementById('displayManualMargin');e.innerText=mm.toFixed(1);e.className=mm<0?"text-red-400":mm<30?"text-gray-400":"text-gold"}
function addIngredientRow(){const i=ingredients.length;ingredients.push({id:i});const c=document.getElementById('ingredientsList'),r=document.createElement('div');r.className="bg-gray-800 p-4 rounded-xl border border-gray-700 relative mb-4";r.id='row-'+i;let h='<option value="">▼ 快速選擇原料...</option>';dbItems.forEach(it=>{h+=`<option value='${encodeURIComponent(JSON.stringify(it))}'>${it.name}</option>`});r.innerHTML=`<div class="flex justify-between mb-3"><select onchange="fillRowFromDb(${i},this.value)" class="bg-gray-700 border border-gray-600 text-white rounded-lg w-full p-2 font-bold focus:outline-none">${h}</select><button onclick="removeRow(${i})" class="ml-3 text-gray-500 text-lg font-bold px-2">✕</button></div><div class="mb-3"><input type="text" id="name-${i}" placeholder="品名" class="input-std py-2 font-bold"></div><div class="grid grid-cols-2 gap-3 mb-3"><input type="number" id="price-${i}" oninput="calculateAll()" placeholder="單價" class="input-std py-2 text-right"><div class="relative"><input type="number" id="weight-${i}" oninput="calculateAll()" placeholder="規格" class="input-std py-2 text-right pr-8"><span id="unit-label-weight-${i}" class="unit-tag"></span></div></div><div class="flex items-center gap-4 pt-3 border-t border-gray-700"><div class="relative flex-1"><label class="text-[10px] text-gold font-bold block tracking-widest">本次用量</label><input type="number" id="used-${i}" oninput="calculateAll()" class="input-std py-2 text-xl font-black text-gold text-center border-gold pr-8 bg-gray-900" placeholder="0"><span id="unit-label-used-${i}" class="unit-tag text-gold"></span></div><div class="text-right pl-4 text-white font-bold text-xl tracking-tighter">$<span id="subtotal-${i}">0.0</span></div></div>`;c.appendChild(r)}
function fillRowFromDb(i,v){if(!v)return;const it=JSON.parse(decodeURIComponent(v));document.getElementById('name-'+i).value=it.name;document.getElementById('price-'+i).value=it.price;document.getElementById('weight-'+i).value=it.weight;const u=it.unit||'';document.getElementById('unit-label-weight-'+i).innerText=u;document.getElementById('unit-label-used-'+i).innerText=u;calculateAll()}
function removeRow(i){document.getElementById('row-'+i).style.display='none';document.getElementById('price-'+i).value=0;document.getElementById('used-'+i).value=0;calculateAll()}
function loadDb(){const s=localStorage.getItem(DB_KEY);dbItems=s?JSON.parse(s):[{name:'特級砂糖',price:1200,weight:50000,unit:'g'}]}
function saveDb(){localStorage.setItem(DB_KEY,JSON.stringify(dbItems))}
function saveDbItem(){const n=document.getElementById('dbName').value,p=parseFloat(document.getElementById('dbPrice').value),w=parseFloat(document.getElementById('dbWeight').value),u=document.getElementById('dbUnit').value,e=parseInt(document.getElementById('editIndex').value);if(n&&p&&w){const i={name:n,price:p,weight:w,unit:u};if(e>=0)dbItems[e]=i;else dbItems.push(i);saveDb();renderDbList();resetDbInput()}else alert('資料填寫不完整')}
function renderDbList(){const c=document.getElementById('dbList');c.innerHTML='';dbItems.forEach((it,i)=>{const d=document.createElement('div');d.className="bg-gray-800 p-3 rounded-lg border border-gray-700 flex justify-between items-center mb-2";d.innerHTML=`<div class="min-w-0 pr-2"><div class="font-bold text-white truncate">${it.name}</div><div class="text-xs text-gray-400 font-bold">$${it.price}/${it.weight}${it.unit||''}</div></div><div class="flex gap-2"><button onclick="editDbItem(${i})" class="px-3 py-1 border border-gold text-gold rounded text-xs font-bold">修改</button><button onclick="askDeleteDb(${i})" class="px-3 py-1 text-gray-500 rounded text-xs">刪除</button></div>`;c.appendChild(d)})}
function editDbItem(i){const it=dbItems[i];document.getElementById('dbName').value=it.name;document.getElementById('dbPrice').value=it.price;document.getElementById('dbWeight').value=it.weight;document.getElementById('dbUnit').value=it.unit||'';document.getElementById('editIndex').value=i;document.getElementById('saveDbBtn').innerText="確認更新"}
function askDeleteDb(i){hazukiConfirm('確定要刪除此庫存原料資料嗎？',()=>{dbItems.splice(i,1);saveDb();renderDbList();resetDbInput()})}
function resetDbInput(){document.getElementById('dbName').value='';document.getElementById('dbPrice').value='';document.getElementById('dbWeight').value='';document.getElementById('dbUnit').value='';document.getElementById('editIndex').value='-1';document.getElementById('saveDbBtn').innerText="儲存數據"}
function exportAllData(){
  var data={
    ingredients: localStorage.getItem('hazuki_ingredients_v2'),
    recipes: localStorage.getItem('hazuki_recipes_v2')
  };
  var json=JSON.stringify(data);
  var ta=document.createElement('textarea');
  ta.value=json;
  ta.style.position='fixed';ta.style.top='0';ta.style.left='0';
  ta.style.width='100%';ta.style.height='200px';
  ta.style.zIndex='99999';ta.style.background='#1f2937';
  ta.style.color='#f3f4f6';ta.style.fontSize='12px';ta.style.padding='10px';
  ta.style.border='2px solid #D4AF37';ta.style.borderRadius='8px';
  var msg=document.createElement('div');
  msg.innerHTML='<div style="position:fixed;top:0;left:0;right:0;z-index:100000;background:#1A4C3F;padding:10px;text-align:center;"><div style="color:#D4AF37;font-weight:bold;margin-bottom:8px;">📤 長按全選後複製，再到新版貼上匯入</div><button onclick="this.parentElement.parentElement.remove();document.querySelector('textarea[data-export]') && document.querySelector('textarea[data-export]').remove()" style="background:#D4AF37;color:#1A4C3F;border:none;padding:8px 20px;border-radius:8px;font-weight:bold;">關閉</button></div>';
  ta.setAttribute('data-export','1');
  document.body.appendChild(msg);
  document.body.appendChild(ta);
  ta.focus();ta.select();
}
function importAllData(){
  var input=prompt('請貼上從舊版匯出的資料：');
  if(!input)return;
  try{
    var data=JSON.parse(input);
    if(data.ingredients) localStorage.setItem('hazuki_ingredients_v2',data.ingredients);
    if(data.recipes) localStorage.setItem('hazuki_recipes_v2',data.recipes);
    alert('✅ 匯入成功！資料已還原，請重新整理頁面。');
    location.reload();
  }catch(e){alert('❌ 格式錯誤，請重新複製完整資料再試')}
}
function doLogin(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;if(u==='Boss'&&p==='85888588'){document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';sessionStorage.setItem('hazuki_auth','1')}else{document.getElementById('loginErr').innerText='帳號或密碼錯誤，請再試一次';document.getElementById('loginPass').value=''}}

// 資料初始化：如果是第一次開啟（無資料），自動載入內嵌資料
